name: AI daily article

# 07:00 Vietnam (UTC+7) = 00:00 UTC
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  write:
    name: POST /api/cron/ai-daily-article
    runs-on: ubuntu-latest
    steps:
      - name: Call production cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -euo pipefail
          BASE_URL="${APP_URL:-https://giahomnay.site}"
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Thiếu secret CRON_SECRET"
            exit 1
          fi
          code="$(curl -sS -o /tmp/ai.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{}" \
            --connect-timeout 30 --max-time 180 \
            "${BASE_URL%/}/api/cron/ai-daily-article")"
          echo "HTTP ${code}"
          cat /tmp/ai.json || true
          echo
          test "$code" = "200"
