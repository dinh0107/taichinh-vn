name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_APP_URL: https://giahomnay.site

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          # Dummy URL — generate does not need a live DB
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # .next is a hidden folder — must enable or artifact is empty
          include-hidden-files: true
          path: |
            .next
            !.next/cache
            _next
          retention-days: 3
          compression-level: 6

  deploy:
    name: Deploy to Plesk (SFTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: deploy-out

      - name: Verify build output
        run: |
          echo "=== deploy-out tree (depth 2) ==="
          find deploy-out -maxdepth 2 -type d | head -50
          find deploy-out -maxdepth 2 -name 'prerender-manifest.json' || true
          test -f deploy-out/.next/prerender-manifest.json
          test -d deploy-out/_next/static
          du -sh deploy-out/.next deploy-out/_next

      # Secrets: PLESK_SFTP_HOST, PLESK_SFTP_USER, PLESK_SFTP_PASSWORD,
      #          PLESK_SFTP_PORT (e.g. 22), PLESK_SFTP_REMOTE_PATH (e.g. /httpdocs)
      - name: SFTP upload .next
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.PLESK_SFTP_HOST }}
          username: ${{ secrets.PLESK_SFTP_USER }}
          password: ${{ secrets.PLESK_SFTP_PASSWORD }}
          port: ${{ secrets.PLESK_SFTP_PORT || 22 }}
          local_path: "./deploy-out/.next/*"
          remote_path: ${{ secrets.PLESK_SFTP_REMOTE_PATH }}/.next
          sftp_only: true
          delete_remote_files: false

      - name: SFTP upload _next
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.PLESK_SFTP_HOST }}
          username: ${{ secrets.PLESK_SFTP_USER }}
          password: ${{ secrets.PLESK_SFTP_PASSWORD }}
          port: ${{ secrets.PLESK_SFTP_PORT || 22 }}
          local_path: "./deploy-out/_next/*"
          remote_path: ${{ secrets.PLESK_SFTP_REMOTE_PATH }}/_next
          sftp_only: true
          delete_remote_files: false
