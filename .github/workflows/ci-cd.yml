name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_APP_URL: https://giahomnay.site

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          # Dummy URL — generate does not need a live DB
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # .next is a hidden folder — must enable or artifact is empty
          include-hidden-files: true
          path: |
            .next
            !.next/cache
            _next
          retention-days: 3
          compression-level: 6

  deploy:
    name: Deploy to Plesk (SFTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: deploy-out

      - name: Verify build output
        run: |
          echo "=== deploy-out tree (depth 2) ==="
          find deploy-out -maxdepth 2 -type d | head -50
          find deploy-out -maxdepth 2 -name 'prerender-manifest.json' || true
          test -f deploy-out/.next/prerender-manifest.json
          test -d deploy-out/_next/static
          du -sh deploy-out/.next deploy-out/_next

      # Secrets: PLESK_SFTP_HOST, USER, PASSWORD, PORT, REMOTE_PATH
      # REMOTE_PATH = app root as seen AFTER SFTP login (often "httpdocs" or "." if already chrooted)
      - name: SFTP upload .next and _next
        env:
          SFTP_HOST: ${{ secrets.PLESK_SFTP_HOST }}
          SFTP_USER: ${{ secrets.PLESK_SFTP_USER }}
          SFTP_PASS: ${{ secrets.PLESK_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.PLESK_SFTP_PORT }}
          SFTP_REMOTE: ${{ secrets.PLESK_SFTP_REMOTE_PATH }}
        run: |
          set -euo pipefail
          PORT="${SFTP_PORT:-22}"
          # trim trailing slashes (keep a single "." if that is the path)
          REMOTE="${SFTP_REMOTE%/}"
          if [ -z "$REMOTE" ]; then REMOTE="."; fi

          if [ -z "$SFTP_HOST" ] || [ -z "$SFTP_USER" ] || [ -z "$SFTP_PASS" ]; then
            echo "Missing SFTP secrets (HOST/USER/PASSWORD)"
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          # Write base settings (no indent — lftp script)
          cat > /tmp/lftp-deploy.txt <<'EOF'
set sftp:auto-confirm yes
set cmd:fail-exit yes
set net:max-retries 3
set net:timeout 60
set mirror:parallel-transfer-count 4
set mirror:use-pget-n 0
EOF

          {
            echo "open -u \"${SFTP_USER}\",\"${SFTP_PASS}\" -p ${PORT} sftp://${SFTP_HOST}"
            echo "pwd"
            echo "cls -1"
            echo "cd ${REMOTE}"
            echo "pwd"
            echo "cls -1"
            echo "mkdir -f .next"
            echo "mkdir -f _next"
            echo "mirror -R --delete --verbose=1 deploy-out/.next .next"
            echo "mirror -R --delete --verbose=1 deploy-out/_next _next"
            echo "cls -1 .next"
            echo "bye"
          } >> /tmp/lftp-deploy.txt

          echo "Remote app root (secret): ${REMOTE}"
          lftp -f /tmp/lftp-deploy.txt
          echo "SFTP upload complete"
