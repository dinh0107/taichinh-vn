name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_APP_URL: https://giahomnay.site

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          # Dummy URL — generate does not need a live DB
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # .next is a hidden folder — must enable or artifact is empty
          include-hidden-files: true
          path: |
            .next
            !.next/cache
            _next
          retention-days: 3
          compression-level: 6

  deploy:
    name: Deploy to Plesk (SFTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: deploy-out

      - name: Pack deploy-build.tar.gz
        run: |
          set -euo pipefail
          test -f deploy-out/.next/prerender-manifest.json
          test -d deploy-out/_next/static
          # Single archive avoids SFTP mkdir/mirror into hidden .next (fails on many Plesk Windows)
          tar -C deploy-out -czf deploy-build.tar.gz .next _next
          ls -lh deploy-build.tar.gz

      # Upload ONE file; Plesk scripts\deploy-plesk-fast.bat extracts it.
      # REMOTE_PATH = app root after SFTP login: "httpdocs" or "."
      - name: SFTP upload deploy-build.tar.gz
        env:
          SFTP_HOST: ${{ secrets.PLESK_SFTP_HOST }}
          SFTP_USER: ${{ secrets.PLESK_SFTP_USER }}
          SFTP_PASS: ${{ secrets.PLESK_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.PLESK_SFTP_PORT }}
          SFTP_REMOTE: ${{ secrets.PLESK_SFTP_REMOTE_PATH }}
        run: |
          set -euo pipefail
          PORT="${SFTP_PORT:-22}"
          REMOTE="${SFTP_REMOTE%/}"
          if [ -z "$REMOTE" ]; then REMOTE="."; fi

          if [ -z "$SFTP_HOST" ] || [ -z "$SFTP_USER" ] || [ -z "$SFTP_PASS" ]; then
            echo "Missing SFTP secrets (HOST/USER/PASSWORD)"
            exit 1
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          {
            echo "set sftp:auto-confirm yes"
            echo "set cmd:fail-exit yes"
            echo "set net:max-retries 3"
            echo "set net:timeout 120"
            echo "open -u \"${SFTP_USER}\",\"${SFTP_PASS}\" -p ${PORT} sftp://${SFTP_HOST}"
            echo "pwd"
            echo "cls -1"
            echo "cd ${REMOTE}"
            echo "pwd"
            echo "put deploy-build.tar.gz"
            echo "cls -1 deploy-build.tar.gz"
            echo "bye"
          } > /tmp/lftp-deploy.txt

          echo "Remote app root: ${REMOTE}"
          lftp -f /tmp/lftp-deploy.txt
          echo "SFTP upload complete — extract with deploy-plesk-fast.bat on server"
