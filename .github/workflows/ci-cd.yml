name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_APP_URL: https://giahomnay.site

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          # Dummy URL — generate does not need a live DB
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # .next is a hidden folder — must enable or artifact is empty
          include-hidden-files: true
          path: |
            .next
            !.next/cache
            _next
          retention-days: 3
          compression-level: 6

  deploy:
    name: Deploy to Plesk (SFTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: deploy-out

      - name: Pack deploy-build.tar.gz
        run: |
          set -euo pipefail
          test -f deploy-out/.next/prerender-manifest.json
          test -d deploy-out/_next/static
          # Single archive avoids SFTP mkdir/mirror into hidden .next (fails on many Plesk Windows)
          tar -C deploy-out -czf deploy-build.tar.gz .next _next
          ls -lh deploy-build.tar.gz

      # Login OK ≠ đúng thư mục app. Probe httpdocs / package.json rồi put 1 file.
      - name: SFTP upload deploy-build.tar.gz
        env:
          SFTP_HOST: ${{ secrets.PLESK_SFTP_HOST }}
          SFTP_USER: ${{ secrets.PLESK_SFTP_USER }}
          SFTP_PASS: ${{ secrets.PLESK_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.PLESK_SFTP_PORT }}
          SFTP_REMOTE: ${{ secrets.PLESK_SFTP_REMOTE_PATH }}
          APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
        run: |
          set -euo pipefail
          PORT="${SFTP_PORT:-22}"
          REMOTE="${SFTP_REMOTE%/}"
          DOMAIN="$(echo "${APP_URL}" | sed -E 's#https?://##' | cut -d/ -f1)"

          if [ -z "$SFTP_HOST" ] || [ -z "$SFTP_USER" ] || [ -z "$SFTP_PASS" ]; then
            echo "Missing SFTP secrets (HOST/USER/PASSWORD)"
            exit 1
          fi

          if echo "${REMOTE}" | grep -Eqi '(^|/)(C:)?/?Users/'; then
            echo "::warning::PLESK_SFTP_REMOTE_PATH trỏ vào C:/Users — bỏ qua, sẽ tự tìm httpdocs."
            REMOTE=""
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          lftp_base() {
            printf '%s\n' \
              "set sftp:auto-confirm yes" \
              "set net:max-retries 2" \
              "set net:timeout 60" \
              "open -u \"${SFTP_USER}\",\"${SFTP_PASS}\" -p ${PORT} sftp://${SFTP_HOST}"
          }

          echo "==> SFTP home (sau login):"
          {
            lftp_base
            echo "pwd"
            echo "cls -1"
            echo "bye"
          } | lftp || true

          # Thử lần lượt — path đúng là chỗ có package.json hoặc web.config
          CANDIDATES=()
          [ -n "${REMOTE:-}" ] && CANDIDATES+=("$REMOTE")
          CANDIDATES+=(
            "."
            "httpdocs"
            "/httpdocs"
            "/C:/Inetpub/vhosts/${DOMAIN}/httpdocs"
            "C:/Inetpub/vhosts/${DOMAIN}/httpdocs"
          )

          FOUND=""
          for path in "${CANDIDATES[@]}"; do
            echo "==> Thử cd: ${path}"
            if {
              lftp_base
              echo "set cmd:fail-exit yes"
              echo "cd ${path}"
              echo "cls -1 package.json"
              echo "bye"
            } | lftp 2>/dev/null; then
              FOUND="$path"
              echo "==> OK — dùng remote: ${FOUND}"
              break
            fi
            if {
              lftp_base
              echo "set cmd:fail-exit yes"
              echo "cd ${path}"
              echo "cls -1 web.config"
              echo "bye"
            } | lftp 2>/dev/null; then
              FOUND="$path"
              echo "==> OK — dùng remote: ${FOUND}"
              break
            fi
          done

          if [ -z "$FOUND" ]; then
            echo "::error::Login được nhưng không tìm thấy thư mục app (package.json / web.config)."
            echo "Bạn đang vào home Windows (AppData/Documents), chưa phải httpdocs."
            echo "Cách sửa:"
            echo "  1) Plesk → FTP Access: dùng user FTP của domain (home = domain)."
            echo "  2) Hoặc set PLESK_SFTP_REMOTE_PATH đúng path, ví dụ:"
            echo "       /C:/Inetpub/vhosts/${DOMAIN}/httpdocs"
            echo "  3) WinSCP: vào folder có package.json → copy đường dẫn đó vào secret."
            exit 1
          fi

          {
            lftp_base
            echo "set cmd:fail-exit yes"
            echo "set net:timeout 180"
            echo "cd ${FOUND}"
            echo "pwd"
            echo "put deploy-build.tar.gz"
            echo "cls -1 deploy-build.tar.gz"
            echo "bye"
          } | lftp

          echo "SFTP upload complete → ${FOUND}/deploy-build.tar.gz"
          echo "Tiếp: chạy deploy-plesk-fast.bat trên server để giải nén."
