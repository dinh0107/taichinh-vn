name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_APP_URL: https://giahomnay.site

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          # Dummy URL — generate does not need a live DB
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # .next is a hidden folder — must enable or artifact is empty
          include-hidden-files: true
          path: |
            .next
            !.next/cache
            _next
          retention-days: 3
          compression-level: 6

  deploy:
    name: Deploy to Plesk (SFTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: deploy-out

      - name: Pack deploy-build.tar.gz
        run: |
          set -euo pipefail
          test -f deploy-out/.next/prerender-manifest.json
          test -d deploy-out/.next/static
          mkdir -p deploy-out/_next
          rm -rf deploy-out/_next/static
          cp -a deploy-out/.next/static deploy-out/_next/static
          CSS_COUNT="$(find deploy-out/.next/static -type f -name '*.css' | wc -l)"
          echo "CSS files in artifact: ${CSS_COUNT}"
          test "${CSS_COUNT}" -gt 0
          # Sample path for health check after deploy
          SAMPLE_REL="$(find deploy-out/.next/static -type f -name '*.css' | head -1 | sed 's|^deploy-out/.next/static/||')"
          echo "SAMPLE_CSS=${SAMPLE_REL}" >> "$GITHUB_ENV"
          tar -C deploy-out -czf deploy-build.tar.gz .next _next
          ls -lh deploy-build.tar.gz
          tar -tzf deploy-build.tar.gz | grep -E '\.css$' | head -5

      # 1) Webhook → bat bat đầu ĐỢI tar (tối đa 5 phút)
      - name: Trigger Plesk Git pull (webhook)
        env:
          PLESK_GIT_WEBHOOK_URL: ${{ secrets.PLESK_GIT_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PLESK_GIT_WEBHOOK_URL:-}" ]; then
            echo "::error::Thiếu secret PLESK_GIT_WEBHOOK_URL"
            exit 1
          fi
          echo "Calling Plesk Git webhook..."
          code="$(curl -sS -o /tmp/plesk-hook.out -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' -d '{}' \
            --connect-timeout 30 --max-time 120 \
            "${PLESK_GIT_WEBHOOK_URL}" || true)"
          echo "POST HTTP ${code}"
          if [ "$code" != "200" ] && [ "$code" != "201" ] && [ "$code" != "202" ] && [ "$code" != "204" ]; then
            code="$(curl -sS -o /tmp/plesk-hook.out -w '%{http_code}' -X GET \
              --connect-timeout 30 --max-time 120 \
              "${PLESK_GIT_WEBHOOK_URL}" || true)"
            echo "GET HTTP ${code}"
          fi
          case "$code" in
            200|201|202|204) echo "Webhook OK — bat đang chờ tar..." ;;
            *) echo "::error::Webhook HTTP ${code}"; exit 1 ;;
          esac
          # Chỉ chờ bat vào vòng wait — KHÔNG chờ bat xong (tránh hết timeout trước khi upload)
          sleep 20

      # 2) Upload tar while bat is waiting
      - name: Upload deploy-build.tar.gz (FTP/FTPS/SFTP)
        env:
          FTP_HOST: ${{ secrets.PLESK_SFTP_HOST }}
          FTP_USER: ${{ secrets.PLESK_SFTP_USER }}
          FTP_PASS: ${{ secrets.PLESK_SFTP_PASSWORD }}
          FTP_PORT: ${{ secrets.PLESK_SFTP_PORT }}
          FTP_REMOTE: ${{ secrets.PLESK_SFTP_REMOTE_PATH }}
        run: |
          set -euo pipefail

          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "Missing secrets PLESK_SFTP_HOST / USER / PASSWORD"
            exit 1
          fi

          REMOTE="${FTP_REMOTE%/}"
          if [ -z "$REMOTE" ] || echo "$REMOTE" | grep -Eqi 'Users/'; then
            REMOTE="httpdocs"
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          TRIES=()
          if [ -n "${FTP_PORT:-}" ]; then
            if [ "$FTP_PORT" = "22" ]; then
              TRIES+=("sftp|22")
            else
              TRIES+=("ftps|$FTP_PORT" "ftp|$FTP_PORT")
            fi
          fi
          TRIES+=("ftps|21" "ftp|21" "sftp|22")

          upload_ok=0
          for try in "${TRIES[@]}"; do
            PROTO="${try%%|*}"
            PORT="${try##*|}"
            echo "==> Thử ${PROTO}://${FTP_HOST}:${PORT}  cd ${REMOTE}"

            set +e
            lftp -c "
              set ssl:verify-certificate no
              set ftp:ssl-allow yes
              set ftp:ssl-force false
              set ftp:passive-mode yes
              set sftp:auto-confirm yes
              set cmd:fail-exit yes
              set net:max-retries 2
              set net:timeout 90
              open -u \"${FTP_USER}\",\"${FTP_PASS}\" -p ${PORT} ${PROTO}://${FTP_HOST}
              cd /
              cls -1
              cd ${REMOTE}
              pwd
              put -O . deploy-build.tar.gz
              cls -1 deploy-build.tar.gz
              bye
            "
            rc=$?
            set -e

            if [ "$rc" -eq 0 ]; then
              echo "==> Upload OK → /${REMOTE}/deploy-build.tar.gz"
              upload_ok=1
              break
            fi
            echo "==> ${PROTO}:${PORT} thất bại (rc=${rc})"
          done

          if [ "$upload_ok" -ne 1 ]; then
            echo "::error::Không upload được tar"
            exit 1
          fi

      # 3) Chờ bat extract + CSS online (không qua Next API — tránh 404 khi app chưa có route mới)
      - name: Wait until CSS is live
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -euo pipefail
          BASE_URL="${APP_URL:-https://giahomnay.site}"
          SAMPLE="${SAMPLE_CSS:-}"
          if [ -z "$SAMPLE" ]; then
            echo "::warning::Không có SAMPLE_CSS — bỏ qua poll"
            exit 0
          fi
          URL="${BASE_URL%/}/_next/static/${SAMPLE}"
          echo "Polling ${URL}"
          for i in $(seq 1 36); do
            code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 30 "$URL" || true)"
            echo "try ${i}/36 → HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "CSS live OK"
              exit 0
            fi
            sleep 5
          done
          echo "::error::CSS vẫn 404 sau ~3 phút — kiểm tra Plesk deploy log / deploy-plesk-fast.bat"
          exit 1
