name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_APP_URL: https://giahomnay.site

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          # Dummy URL — generate does not need a live DB
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # .next is a hidden folder — must enable or artifact is empty
          include-hidden-files: true
          path: |
            .next
            !.next/cache
            _next
          retention-days: 3
          compression-level: 6

  deploy:
    name: Deploy to Plesk (SFTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: deploy-out

      - name: Pack deploy-build.tar.gz
        run: |
          set -euo pipefail
          test -f deploy-out/.next/prerender-manifest.json
          test -d deploy-out/.next/static
          mkdir -p deploy-out/_next
          rm -rf deploy-out/_next/static
          cp -a deploy-out/.next/static deploy-out/_next/static
          CSS_COUNT="$(find deploy-out/.next/static -type f -name '*.css' | wc -l)"
          echo "CSS files in artifact: ${CSS_COUNT}"
          test "${CSS_COUNT}" -gt 0
      # Prefer main stylesheet under chunks/ (deterministic) for post-deploy poll
          SAMPLE_REL="$(find deploy-out/.next/static/chunks -type f -name '*.css' 2>/dev/null | sort | head -1 | sed 's|^deploy-out/.next/static/||')"
          if [ -z "$SAMPLE_REL" ]; then
            SAMPLE_REL="$(find deploy-out/.next/static -type f -name '*.css' | sort | head -1 | sed 's|^deploy-out/.next/static/||')"
          fi
          echo "SAMPLE_CSS=${SAMPLE_REL}" >> "$GITHUB_ENV"
          tar -C deploy-out -czf deploy-build.tar.gz .next _next
          ls -lh deploy-build.tar.gz
          tar -tzf deploy-build.tar.gz | grep -E '\.css$' | head -5

      # 1) Webhook trước — git clean xóa untracked; bat bắt đầu ĐỢI tar
      #    (upload tar TRƯỚC webhook sẽ bị git xóa mất file)
      - name: Trigger Plesk Git pull (webhook)
        env:
          PLESK_GIT_WEBHOOK_URL: ${{ secrets.PLESK_GIT_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PLESK_GIT_WEBHOOK_URL:-}" ]; then
            echo "::error::Thiếu secret PLESK_GIT_WEBHOOK_URL"
            exit 1
          fi
          echo "Calling Plesk Git webhook..."
          code="$(curl -sS -o /tmp/plesk-hook.out -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' -d '{}' \
            --connect-timeout 30 --max-time 120 \
            "${PLESK_GIT_WEBHOOK_URL}" || true)"
          echo "POST HTTP ${code}"
          if [ "$code" != "200" ] && [ "$code" != "201" ] && [ "$code" != "202" ] && [ "$code" != "204" ]; then
            code="$(curl -sS -o /tmp/plesk-hook.out -w '%{http_code}' -X GET \
              --connect-timeout 30 --max-time 120 \
              "${PLESK_GIT_WEBHOOK_URL}" || true)"
            echo "GET HTTP ${code}"
          fi
          case "$code" in
            200|201|202|204) echo "Webhook OK — đợi git pull rồi upload tar (re-put nếu bị clean)..." ;;
            *) echo "::error::Webhook HTTP ${code}"; exit 1 ;;
          esac
          # Git pull trên Plesk thường 15–60s; sleep ngắn rồi vòng re-upload xử lý race.
          sleep 25

      # 2+3) Upload tar (lặp lại nếu git clean nuốt) + poll CSS hash của build mới
      - name: Upload tar and wait until CSS is live
        env:
          FTP_HOST: ${{ secrets.PLESK_SFTP_HOST }}
          FTP_USER: ${{ secrets.PLESK_SFTP_USER }}
          FTP_PASS: ${{ secrets.PLESK_SFTP_PASSWORD }}
          FTP_PORT: ${{ secrets.PLESK_SFTP_PORT }}
          FTP_REMOTE: ${{ secrets.PLESK_SFTP_REMOTE_PATH }}
          APP_URL: ${{ vars.APP_URL }}
        run: |
          set -euo pipefail

          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "Missing secrets PLESK_SFTP_HOST / USER / PASSWORD"
            exit 1
          fi

          REMOTE="${FTP_REMOTE%/}"
          if [ -z "$REMOTE" ] || echo "$REMOTE" | grep -Eqi 'Users/'; then
            REMOTE="httpdocs"
          fi

          BASE_URL="${APP_URL:-https://giahomnay.site}"
          SAMPLE="${SAMPLE_CSS:-}"
          if [ -z "$SAMPLE" ]; then
            echo "::error::Không có SAMPLE_CSS từ bước pack"
            exit 1
          fi
          URL="${BASE_URL%/}/_next/static/${SAMPLE}"
          echo "Target CSS: ${URL}"

          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          TRIES=()
          if [ -n "${FTP_PORT:-}" ]; then
            if [ "$FTP_PORT" = "22" ]; then
              TRIES+=("sftp|22")
            else
              TRIES+=("ftps|$FTP_PORT" "ftp|$FTP_PORT")
            fi
          fi
          TRIES+=("ftps|21" "ftp|21" "sftp|22")

          PROTO=""
          PORT=""
          for try in "${TRIES[@]}"; do
            P="${try%%|*}"
            N="${try##*|}"
            echo "==> Probe ${P}://${FTP_HOST}:${N}"
            set +e
            lftp -c "
              set ssl:verify-certificate no
              set ftp:ssl-allow yes
              set ftp:ssl-force false
              set ftp:passive-mode yes
              set sftp:auto-confirm yes
              set cmd:fail-exit yes
              set net:max-retries 1
              set net:timeout 30
              open -u \"${FTP_USER}\",\"${FTP_PASS}\" -p ${N} ${P}://${FTP_HOST}
              cd /
              cd ${REMOTE}
              pwd
              bye
            "
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then
              PROTO="$P"
              PORT="$N"
              echo "==> Dùng ${PROTO}:${PORT}"
              break
            fi
          done
          if [ -z "$PROTO" ]; then
            echo "::error::Không kết nối được FTP/SFTP"
            exit 1
          fi

          upload_tar() {
            set +e
            lftp -c "
              set ssl:verify-certificate no
              set ftp:ssl-allow yes
              set ftp:ssl-force false
              set ftp:passive-mode yes
              set sftp:auto-confirm yes
              set cmd:fail-exit yes
              set net:max-retries 2
              set net:timeout 90
              open -u \"${FTP_USER}\",\"${FTP_PASS}\" -p ${PORT} ${PROTO}://${FTP_HOST}
              cd /
              cd ${REMOTE}
              put -O . deploy-build.tar.gz
              cls -1 deploy-build.tar.gz
              bye
            "
            local rc=$?
            set -e
            return $rc
          }

          # ~8 phút: re-upload mỗi 30s (tránh git clean nuốt tar trước khi bat chờ),
          # poll CSS mỗi 5s.
          MAX=96
          upload_ok=0
          for i in $(seq 1 "$MAX"); do
            # Re-put tar mỗi 6 vòng (~30s) — lần 1 luôn upload
            if [ "$i" -eq 1 ] || [ $((i % 6)) -eq 1 ]; then
              echo "==> [${i}/${MAX}] Upload deploy-build.tar.gz"
              if upload_tar; then
                upload_ok=1
                echo "    upload OK"
              else
                echo "    upload FAIL (sẽ thử lại)"
              fi
            fi

            code="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 15 --max-time 30 "$URL" || true)"
            echo "try ${i}/${MAX} → HTTP ${code}"
            if [ "$code" = "200" ]; then
              echo "CSS live OK"
              exit 0
            fi
            sleep 5
          done

          if [ "$upload_ok" -ne 1 ]; then
            echo "::error::Không upload được tar lần nào"
            exit 1
          fi
          echo "::error::CSS vẫn 404 sau ~8 phút — kiểm tra Plesk deploy log / deploy-plesk-fast.bat"
          echo "SAMPLE=${SAMPLE}"
          echo "Live homepage CSS (để so):"
          curl -sS "${BASE_URL%/}/" | grep -oE '/_next/static/[^\" ]+\.css' | head -5 || true
          exit 1
