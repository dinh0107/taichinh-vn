name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_APP_URL: https://giahomnay.site

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          # Dummy URL — generate does not need a live DB
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next
            _next
          retention-days: 3
