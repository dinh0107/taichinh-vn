name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  NEXT_PUBLIC_APP_URL: https://giahomnay.site

jobs:
  check:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          # Dummy URL — generate does not need a live DB
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
      - name: next build
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/ci
          NEXT_PUBLIC_APP_URL: ${{ env.NEXT_PUBLIC_APP_URL }}
      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          # .next is a hidden folder — must enable or artifact is empty
          include-hidden-files: true
          path: |
            .next
            !.next/cache
            _next
          retention-days: 3
          compression-level: 6

  deploy:
    name: Deploy to Plesk (SFTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: deploy-out

      - name: Pack deploy-build.tar.gz
        run: |
          set -euo pipefail
          test -f deploy-out/.next/prerender-manifest.json
          test -d deploy-out/_next/static
          # Single archive avoids SFTP mkdir/mirror into hidden .next (fails on many Plesk Windows)
          tar -C deploy-out -czf deploy-build.tar.gz .next _next
          ls -lh deploy-build.tar.gz

      # FileZilla thấy /httpdocs → thường là FTP/FTPS :21 (không phải SFTP Windows home).
      - name: Upload deploy-build.tar.gz (FTP/FTPS/SFTP)
        env:
          FTP_HOST: ${{ secrets.PLESK_SFTP_HOST }}
          FTP_USER: ${{ secrets.PLESK_SFTP_USER }}
          FTP_PASS: ${{ secrets.PLESK_SFTP_PASSWORD }}
          FTP_PORT: ${{ secrets.PLESK_SFTP_PORT }}
          FTP_REMOTE: ${{ secrets.PLESK_SFTP_REMOTE_PATH }}
        run: |
          set -euo pipefail

          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASS" ]; then
            echo "Missing secrets PLESK_SFTP_HOST / USER / PASSWORD"
            exit 1
          fi

          REMOTE="${FTP_REMOTE%/}"
          if [ -z "$REMOTE" ] || echo "$REMOTE" | grep -Eqi 'Users/'; then
            REMOTE="httpdocs"
          fi

          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

          # proto|port — ưu tiên FTPS/FTP (giống FileZilla Plesk), sau đó SFTP
          TRIES=()
          if [ -n "${FTP_PORT:-}" ]; then
            # User set port explicitly — try matching protocols for that port
            if [ "$FTP_PORT" = "22" ]; then
              TRIES+=("sftp|22")
            else
              TRIES+=("ftps|$FTP_PORT" "ftp|$FTP_PORT")
            fi
          fi
          TRIES+=("ftps|21" "ftp|21" "sftp|22")

          upload_ok=0
          for try in "${TRIES[@]}"; do
            PROTO="${try%%|*}"
            PORT="${try##*|}"
            echo "==> Thử ${PROTO}://${FTP_HOST}:${PORT}  cd ${REMOTE}"

            set +e
            lftp -c "
              set ssl:verify-certificate no
              set ftp:ssl-allow yes
              set ftp:ssl-force false
              set ftp:passive-mode yes
              set sftp:auto-confirm yes
              set cmd:fail-exit yes
              set net:max-retries 2
              set net:timeout 90
              open -u \"${FTP_USER}\",\"${FTP_PASS}\" -p ${PORT} ${PROTO}://${FTP_HOST}
              cd /
              cls -1
              cd ${REMOTE}
              pwd
              put -O . deploy-build.tar.gz
              cls -1 deploy-build.tar.gz
              bye
            "
            rc=$?
            set -e

            if [ "$rc" -eq 0 ]; then
              echo "==> Upload OK qua ${PROTO}:${PORT} → /${REMOTE}/deploy-build.tar.gz"
              upload_ok=1
              break
            fi
            echo "==> ${PROTO}:${PORT} thất bại (rc=${rc}), thử cách khác..."
          done

          if [ "$upload_ok" -ne 1 ]; then
            echo "::error::Không upload được. Kiểm tra:"
            echo "  - User/pass = FTP Access trong Plesk (login FileZilla thấy httpdocs)"
            echo "  - PLESK_SFTP_REMOTE_PATH = httpdocs"
            echo "  - Port FileZilla (21 FTPS/FTP). Secret PLESK_SFTP_PORT có thể để 21"
            exit 1
          fi

          echo "Tiếp: chạy deploy-plesk-fast.bat trên server để giải nén."
